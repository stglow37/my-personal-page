<!DOCTYPE html>
<html>
<head>
    <title>우진의 개인 페이지</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; line-height: 1.6; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        .note { border-bottom: 1px solid #ddd; padding: 10px 0; }
    </style>
</head>
<body>
    <h1>나만의 아이디어 노트</h1>
    
    <input type="text" id="title" placeholder="제목을 입력하세요">
    <select id="category" style="width: 100%; padding: 10px; margin-bottom: 10px; background: #2d2d2d; color: white; border: 1px solid #444;">
        <option value="일반">일반</option>
        <option value="물리연구">물리연구</option>
        <option value="프로그래밍">프로그래밍</option>
        <option value="학교생활">학교생활</option>
    </select>
    <textarea id="content" placeholder="내용을 입력하세요" rows="4"></textarea>
    <button onclick="saveNote()">저장하기</button>

    <hr>
    <div style="margin-bottom: 20px; padding: 15px; background: #333; border-radius: 10px;">
        <h4>새 폴더 만들기</h4>
        <input type="text" id="newFolderName" placeholder="폴더 이름을 입력하세요">
        <button onclick="addFolder()" style="background: #27ae60;">폴더 추가</button>
    </div>

    <select id="folderSelect"></select>
    <hr>
    <div id="notes-list">
        </div>

    <script>
        // 서버에서 메모 목록 가져오기
        async function loadNotes() {
            const response = await fetch('/notes/');
            const notes = await response.json();
            const listDiv = document.getElementById('notes-list');
            listDiv.innerHTML = '';
            notes.forEach(note => {
                listDiv.innerHTML += `
                    <div class="note">
                        <small style="color: #4a90e2; font-weight: bold;">#${note.category}</small>
                        <h3>
                            ${note.title} 
                            <button onclick="deleteNote(${note.id})" style="background:red; font-size:10px; margin-left:10px;">삭제</button>
                        </h3>
                        <p>${note.content}</p>
                    </div>`;
            });
        }

        async function deleteNote(id) {
            if (confirm("정말 삭제하시겠습니까?")) {
                await fetch(`/notes/${id}`, {
                    method: 'DELETE'
                });
                loadNotes(); // 목록 새로고침
            }
        }
        
        // 메모 서버에 저장하기
        async function saveNote() {
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const category = document.getElementById('category').value;
            
            await fetch(`/notes/?title=${encodeURIComponent(title)}&content=${encodeURIComponent(content)}&category=${encodeURIComponent(category)}`, {
                method: 'POST'
            });
            
            document.getElementById('title').value = '';
            document.getElementById('content').value = '';
            loadNotes(); // 목록 새로고침
        }

        // 1. 새로운 폴더를 DB에 저장
        async function addFolder() {
            const name = document.getElementById('newFolderName').value;
            await fetch(`/categories/?name=${encodeURIComponent(name)}`, { method: 'POST' });
            location.reload(); // 새로고침해서 목록 갱신
        }

        // 2. 저장된 폴더 목록을 불러와서 선택창에 넣어주기
        async function loadFolders() {
            const response = await fetch('/categories/'); // (API 추가 필요)
            const folders = await response.json();
            const select = document.getElementById('folderSelect');
            select.innerHTML = folders.map(f => `<option value="${f.id}">${f.name}</option>`).join('');
        }

        loadNotes(); // 페이지 열자마자 목록 불러오기
    </script>
</body>
</html>
